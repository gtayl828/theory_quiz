<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greg's Guitar Theory Quiz</title>
<style>
:root {
  --bg:        #0e0d0b;
  --surface:   #161512;
  --surface2:  #1d1c18;
  --border:    #2c2b25;
  --border2:   #383630;
  --accent:    #e8c84a;
  --root-bg:   #35290a;
  --root-str:  #c8a830;
  --min-bg:    #1c1038;
  --min-col:   #9a78e8;
  --min-str:   #6040b0;
  --text:      #d8d2c4;
  --text-dim:  #7a7468;
  --text-faint:#2e2c26;
  --green:     #52c48a;
  --green-bg:  #0d2e1c;
  --green-str: #2a8058;
  --red:       #ff6060;
  --red-bg:    #300808;
  --red-str:   #c03030;
  --blue:      #5a9ce0;
  --blue-bg:   #0e1e38;
  --blue-str:  #2a5898;
  --display-font:'Impact','Arial Narrow Bold',sans-serif;
  --mono-font:   'Courier New','Consolas',monospace;
  --body-font:   'Arial Narrow','Arial',sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--body-font);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:20px 20px 60px; gap:14px;
}

/* HEADER */
.header {
  width:100%; max-width:820px;
  display:flex; align-items:center; gap:16px;
  padding:14px 20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; border-left:4px solid var(--accent);
}
h1 { font-family:var(--display-font); font-size:34px; letter-spacing:5px; color:var(--accent); line-height:1; }
.header-sub { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); margin-top:2px; }
.header-right { margin-left:auto; display:flex; gap:8px; }
.hdr-btn {
  font-family:var(--display-font); font-size:13px; letter-spacing:2px;
  padding:7px 16px; border-radius:5px; cursor:pointer; transition:all 0.1s;
  border:1.5px solid; white-space:nowrap;
}
.btn-analytics { background:var(--blue-bg); border-color:var(--blue-str); color:var(--blue); }
.btn-analytics:hover { background:#162840; border-color:var(--blue); }
.btn-end { background:var(--red-bg); border-color:var(--red-str); color:var(--red); display:none; }
.btn-end:hover { background:#3d0a0a; }

/* SETUP */
.setup {
  width:100%; max-width:820px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:28px 32px;
  display:flex; flex-direction:column; gap:22px;
}
.setup-title { font-family:var(--display-font); font-size:20px; letter-spacing:4px; color:var(--accent); }
.setup-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
.tog-row { display:flex; gap:6px; flex-wrap:wrap; }
.tog-btn {
  font-family:var(--body-font); font-size:14px; font-weight:600; letter-spacing:1px;
  padding:8px 20px; border-radius:5px;
  border:1.5px solid var(--border2); background:var(--surface2);
  color:var(--text-dim); cursor:pointer; transition:all 0.1s;
}
.tog-btn:hover { color:var(--text); border-color:var(--text-dim); }
.on-maj { background:var(--root-bg); border-color:var(--root-str); color:var(--accent); }
.on-min { background:var(--min-bg);  border-color:var(--min-str);  color:var(--min-col); }
.on-key { background:var(--blue-bg); border-color:var(--blue-str); color:var(--blue); }
.start-btn {
  font-family:var(--display-font); font-size:20px; letter-spacing:4px;
  padding:14px 36px; border-radius:6px; cursor:pointer; align-self:flex-start;
  background:var(--root-bg); border:2px solid var(--accent); color:var(--accent);
  transition:all 0.12s; margin-top:4px;
}
.start-btn:hover { background:#4a3410; }

/* QUIZ */
.quiz { width:100%; max-width:820px; display:none; flex-direction:column; gap:12px; }

/* Progress */
.prog-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:11px 16px;
  display:flex; align-items:center; gap:14px;
}
.prog-bg { flex:1; height:5px; background:var(--border2); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; border-radius:3px; transition:width 0.35s; background:var(--accent); }
.prog-stats { display:flex; gap:14px; font-size:13px; white-space:nowrap; }
.s-got  { color:var(--green); font-weight:700; }
.s-miss { color:var(--red);   font-weight:700; }
.s-tot  { color:var(--text-dim); }

/* Question card */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:28px 30px;
  display:flex; flex-direction:column; gap:12px;
}
.card-cat  { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); }
.card-q    { font-family:var(--display-font); font-size:28px; letter-spacing:2px; color:var(--text); line-height:1.25; white-space:pre-line; }
.card-instruct { font-size:12px; color:var(--text-faint); letter-spacing:1px; }

/* Feedback banner */
.feedback {
  display:none; padding:10px 16px; border-radius:5px;
  font-family:var(--mono-font); font-size:14px; font-weight:700; letter-spacing:1px;
  align-items:center; gap:12px;
}
.feedback.show { display:flex; }
.fb-correct { background:var(--green-bg); border:1px solid var(--green-str); color:var(--green); }
.fb-wrong   { background:var(--red-bg);   border:1px solid var(--red-str);   color:var(--red); }
.fb-answer  { font-size:12px; color:var(--text-dim); font-weight:400; margin-left:4px; }

/* ── CHROMATIC SELECTOR ── */
.chromatic-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:20px 24px;
  display:flex; flex-direction:column; gap:10px;
}
.chrom-label {
  font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim);
}
.chrom-rows { display:flex; flex-direction:column; gap:6px; }

/* Natural notes row */
.chrom-natural { display:flex; gap:5px; }
/* Accidental row — aligned under their natural neighbors */
.chrom-accidental {
  display:flex; gap:5px; padding-left:0;
}

.note-btn {
  font-family:var(--mono-font); font-size:13px; font-weight:700;
  border-radius:5px; cursor:pointer; transition:all 0.1s;
  border:1.5px solid var(--border2); background:var(--surface2);
  color:var(--text-dim); user-select:none; letter-spacing:0.5px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
/* Natural notes: wider */
.note-btn.natural {
  width:58px; height:52px; font-size:15px;
}
/* Accidentals: narrower, visually recessed */
.note-btn.accidental {
  width:46px; height:44px; font-size:12px;
  background:#141310; border-color:#2a2820; color:#5a5648;
}
/* Spacer for accidental row alignment */
.acc-spacer { flex-shrink:0; }

.note-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--text); background:#252420; }
.note-btn.selected {
  background:#252210; border-color:var(--accent); color:var(--accent);
  box-shadow:0 0 0 1px var(--accent);
}
.note-btn.accidental.selected {
  background:#252210; border-color:var(--accent); color:var(--accent);
}
.note-btn.correct {
  background:var(--green-bg); border-color:var(--green-str); color:var(--green);
  box-shadow:0 0 0 1px var(--green-str);
}
.note-btn.wrong {
  background:var(--red-bg); border-color:var(--red-str); color:var(--red);
}
.note-btn.reveal {
  background:var(--green-bg); border-color:var(--green-str); color:var(--green);
  opacity:0.6;
}
.note-btn:disabled { cursor:default; }

/* Check / Next buttons */
.action-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.check-btn {
  font-family:var(--display-font); font-size:17px; letter-spacing:3px;
  padding:12px 30px; border-radius:5px; cursor:pointer;
  background:var(--root-bg); border:1.5px solid var(--root-str); color:var(--accent);
  transition:all 0.1s;
}
.check-btn:hover { background:#4a3410; }
.check-btn:disabled { opacity:0.3; cursor:default; }
.next-btn {
  font-family:var(--display-font); font-size:17px; letter-spacing:3px;
  padding:12px 30px; border-radius:5px; cursor:pointer;
  background:var(--surface2); border:1.5px solid var(--border2); color:var(--text-dim);
  transition:all 0.1s; display:none;
}
.next-btn:hover { border-color:var(--text-dim); color:var(--text); }
.sel-count { font-size:12px; color:var(--text-faint); letter-spacing:1px; }

/* SUMMARY */
.summary {
  width:100%; max-width:820px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:28px 32px;
  display:none; flex-direction:column; gap:22px;
}
.sum-title { font-family:var(--display-font); font-size:24px; letter-spacing:4px; color:var(--accent); }
.sum-stats { display:flex; gap:16px; flex-wrap:wrap; }
.sum-stat {
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:6px; padding:12px 18px; display:flex; flex-direction:column; gap:3px; min-width:110px;
}
.sum-val { font-family:var(--display-font); font-size:32px; letter-spacing:2px; }
.sum-lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
.miss-section-title { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); }
.miss-list { display:flex; flex-direction:column; gap:5px; }
.miss-item {
  background:var(--surface2); border-left:3px solid var(--red-str);
  padding:8px 12px; border-radius:0 4px 4px 0;
  font-family:var(--mono-font); font-size:13px; color:var(--text);
}
.miss-item small { color:var(--text-dim); font-size:11px; display:block; margin-top:2px; }
.sum-btns { display:flex; gap:10px; flex-wrap:wrap; }
.sum-btn {
  font-family:var(--display-font); font-size:17px; letter-spacing:3px;
  padding:12px 26px; border-radius:5px; cursor:pointer; border:1.5px solid; transition:all 0.1s;
}
.s-again { background:var(--root-bg); border-color:var(--root-str); color:var(--accent); }
.s-again:hover { background:#4a3410; }
.s-new   { background:var(--surface2); border-color:var(--border2); color:var(--text-dim); }
.s-new:hover { color:var(--text); border-color:var(--text-dim); }
.s-analy { background:var(--blue-bg); border-color:var(--blue-str); color:var(--blue); }
.s-analy:hover { background:#162840; }

/* ANALYTICS MODAL */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.82); z-index:1000;
  justify-content:center; align-items:flex-start;
  overflow-y:auto; padding:28px 18px 60px;
}
.overlay.open { display:flex; }
.modal {
  width:100%; max-width:940px;
  background:#161512; border:1px solid #383530;
  border-radius:10px; overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}
.modal-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 22px; background:#1d1c18; border-bottom:2px solid var(--accent);
}
.modal-title { font-family:var(--display-font); font-size:20px; letter-spacing:4px; color:var(--accent); }
.modal-close {
  font-family:var(--display-font); font-size:16px; letter-spacing:2px;
  padding:5px 14px; background:transparent;
  border:1.5px solid #484540; border-radius:4px;
  color:var(--text-dim); cursor:pointer; transition:all 0.1s;
}
.modal-close:hover { border-color:var(--accent); color:var(--accent); }
.modal-body { padding:22px; display:flex; flex-direction:column; gap:22px; overflow-y:auto; max-height:82vh; }

.a-top { display:flex; gap:12px; flex-wrap:wrap; }
.a-stat {
  flex:1; min-width:120px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:6px; padding:12px 16px; display:flex; flex-direction:column; gap:3px;
}
.a-stat-val { font-family:var(--display-font); font-size:30px; letter-spacing:2px; }
.a-stat-lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); }
.a-sec { display:flex; flex-direction:column; gap:8px; }
.a-sec-hdr {
  font-family:var(--display-font); font-size:13px; letter-spacing:3px;
  color:var(--text-dim); border-bottom:1px solid var(--border); padding-bottom:6px;
}
.a-filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.a-f-btn {
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  padding:5px 12px; border-radius:4px; cursor:pointer;
  border:1.5px solid var(--border2); background:var(--surface2); color:var(--text-dim);
  transition:all 0.1s;
}
.a-f-btn:hover { color:var(--text); }
.a-f-btn.on { background:var(--surface); border-color:var(--accent); color:var(--accent); }
.a-table { width:100%; border-collapse:collapse; font-size:13px; }
.a-table th {
  text-align:left; padding:7px 11px;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-faint); border-bottom:2px solid var(--border);
}
.a-table td { padding:7px 11px; border-bottom:1px solid var(--surface2); color:var(--text-dim); }
.a-table tr:hover td { background:#1a1916; }
.td-q   { font-family:var(--mono-font); color:var(--text) !important; font-size:12px; }
.td-ans { font-family:var(--mono-font); color:var(--accent) !important; font-size:12px; }
.td-acc { font-family:var(--mono-font); font-weight:700; }
.acc-good { color:var(--green); }
.acc-mid  { color:var(--accent); }
.acc-bad  { color:var(--red); }
.bar-bg { width:70px; height:5px; background:var(--border2); border-radius:3px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:5px; }
.bar-fill { height:100%; border-radius:3px; display:block; }
.sess-row {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:5px; padding:9px 13px; font-size:13px;
}
.sess-date   { color:var(--text-dim); font-size:11px; min-width:150px; }
.sess-detail { color:var(--text-dim); font-size:11px; }
.no-data { color:var(--text-faint); font-size:13px; text-align:center; padding:28px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>THEORY QUIZ</h1>
    <div class="header-sub">Triads &amp; Key Signatures</div>
  </div>
  <div class="header-right">
    <button class="hdr-btn btn-end" id="btnEnd" onclick="endSession()">■ END SESSION</button>
    <button class="hdr-btn btn-analytics" onclick="openAnalytics()">📊 ANALYTICS</button>
  </div>
</div>

<!-- SETUP -->
<div class="setup" id="setupScreen">
  <div class="setup-title">START A SESSION</div>
  <div>
    <div class="setup-label">What to include</div>
    <div class="tog-row" style="margin-top:8px;">
      <button class="tog-btn on-maj" id="togMaj" onclick="toggleCat('maj')">Major Triads</button>
      <button class="tog-btn"        id="togMin" onclick="toggleCat('min')">Minor Triads</button>
      <button class="tog-btn"        id="togKey" onclick="toggleCat('key')">Key Signatures</button>
    </div>
  </div>
  <button class="start-btn" onclick="startSession()">START QUIZ</button>
</div>

<!-- QUIZ -->
<div class="quiz" id="quizScreen">

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-stats">
      <span class="s-got"  id="sGot">✓ 0</span>
      <span class="s-miss" id="sMiss">✗ 0</span>
      <span class="s-tot"  id="sTot">0 answered</span>
    </div>
  </div>

  <!-- Question -->
  <div class="card">
    <div class="card-cat"     id="cardCat"></div>
    <div class="card-q"       id="cardQ"></div>
    <div class="card-instruct" id="cardInstruct"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Chromatic Selector -->
  <div class="chromatic-wrap">
    <div class="chrom-label" id="chromLabel">Select the correct notes:</div>
    <div class="chrom-rows" id="chromRows"></div>
    <div class="action-row">
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()" disabled>CHECK</button>
      <button class="next-btn"  id="nextBtn"  onclick="nextQuestion()">NEXT →</button>
      <span class="sel-count" id="selCount"></span>
    </div>
  </div>

</div>

<!-- SUMMARY -->
<div class="summary" id="summaryScreen">
  <div class="sum-title">SESSION COMPLETE</div>
  <div class="sum-stats"       id="sumStats"></div>
  <div class="miss-section-title" id="missTitle"></div>
  <div class="miss-list"       id="missList"></div>
  <div class="sum-btns">
    <button class="sum-btn s-again" onclick="replaySession()">↺ REPLAY SAME DECK</button>
    <button class="sum-btn s-new"   onclick="goSetup()">NEW SESSION</button>
    <button class="sum-btn s-analy" onclick="openAnalytics()">📊 ANALYTICS</button>
  </div>
</div>

<!-- ANALYTICS MODAL -->
<div class="overlay" id="analyticsOverlay" onclick="if(event.target===this)closeAnalytics()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">ANALYTICS</div>
      <button class="modal-close" onclick="closeAnalytics()">✕ CLOSE</button>
    </div>
    <div class="modal-body" id="analyticsBody"><div class="no-data">Loading…</div></div>
  </div>
</div>

<script>
// ── Theory ────────────────────────────────────────────────────────────
// Chromatic: 12 notes, indices 0-11
// C=0 C#=1 D=2 D#=3 E=4 F=5 F#=6 G=7 G#=8 A=9 A#=10 B=11
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const SHARP_DISP = {'C#':'C♯','D#':'D♯','F#':'F♯','G#':'G♯','A#':'A♯'};
const FLAT_DISP  = {'C#':'D♭','D#':'E♭','F#':'G♭','G#':'A♭','A#':'B♭'};
const FLAT_KEY_SET = new Set(['F','A#','D#','G#']);

function dn(noteStr, keyRoot) {
  const useFl = FLAT_KEY_SET.has(NOTES[keyRoot]);
  if (useFl && FLAT_DISP[noteStr])   return FLAT_DISP[noteStr];
  if (!useFl && SHARP_DISP[noteStr]) return SHARP_DISP[noteStr];
  return noteStr;
}

// The 7 natural notes and their chromatic indices
const NATURALS    = [0,2,4,5,7,9,11]; // C D E F G A B
const ACCIDENTALS = [1,3,6,8,10];     // C# D# F# G# A#

function triadNotes(ri, quality) {
  return (quality==='maj'?[0,4,7]:[0,3,7]).map(i=>(ri+i)%12);
}

const KEY_SIGS = [
  { key:'C',  disp:'C major',  acc:'None',     notes:[] },
  { key:'G',  disp:'G major',  acc:'1 sharp',  notes:[6]  },          // F#
  { key:'D',  disp:'D major',  acc:'2 sharps', notes:[6,1]  },        // F# C#
  { key:'A',  disp:'A major',  acc:'3 sharps', notes:[6,1,8]  },      // F# C# G#
  { key:'E',  disp:'E major',  acc:'4 sharps', notes:[6,1,8,3]  },    // F# C# G# D#
  { key:'B',  disp:'B major',  acc:'5 sharps', notes:[6,1,8,3,10] },  // F# C# G# D# A#
  { key:'F#', disp:'F♯ major', acc:'6 sharps', notes:[6,1,8,3,10,4,11] }, // includes E# and B# — display as E/B
  { key:'C#', disp:'C♯ major', acc:'7 sharps', notes:[6,1,8,3,10,4,11,0] },
  { key:'F',  disp:'F major',  acc:'1 flat',   notes:[10] },           // Bb
  { key:'A#', disp:'B♭ major', acc:'2 flats',  notes:[10,3]  },       // Bb Eb
  { key:'D#', disp:'E♭ major', acc:'3 flats',  notes:[10,3,8]  },     // Bb Eb Ab
  { key:'G#', disp:'A♭ major', acc:'4 flats',  notes:[10,3,8,1]  },   // Bb Eb Ab Db
];

// ── Deck builder ──────────────────────────────────────────────────────
function buildDeck(cats) {
  const qs = [];

  if (cats.has('maj') || cats.has('min')) {
    for (let ri = 0; ri < 12; ri++) {
      for (const q of ['maj','min']) {
        if (!cats.has(q)) continue;
        const notes = triadNotes(ri, q);
        const name  = dn(NOTES[ri], ri) + (q==='min'?'m':'');
        const noteStr = notes.map(n=>dn(NOTES[n],ri)).join(' – ');
        qs.push({
          id:      `triad_${NOTES[ri]}_${q}`,
          cat:     q==='maj'?'MAJOR TRIADS':'MINOR TRIADS',
          q:       `What are the notes in ${name}?`,
          instruct:`Select all 3 notes`,
          answer:  new Set(notes),          // set of chromatic indices
          answerStr: noteStr,
          needed:  3,
          color:   q==='maj'?'var(--accent)':'var(--min-col)',
          keyRoot: ri,
        });
      }
    }
  }

  if (cats.has('key')) {
    for (const ks of KEY_SIGS) {
      const ri = NOTES.indexOf(ks.key);
      // For C major (no accidentals) — special case, select nothing but we need a check
      const needed = ks.notes.length === 0 ? 0 : ks.notes.length;
      qs.push({
        id:      `keysig_${ks.key}`,
        cat:     'KEY SIGNATURES',
        q:       `What are the accidentals in ${ks.disp}?`,
        instruct: needed === 0
          ? `C major has no sharps or flats — hit CHECK with nothing selected`
          : `Select all ${needed} accidental${needed>1?'s':''}`,
        answer:  new Set(ks.notes),
        answerStr: ks.notes.length ? ks.notes.map(n=>dn(NOTES[n],ri)).join('  ') : 'None',
        needed,
        color:   'var(--blue)',
        keyRoot: ri,
        isKeySig: true,
        acc: ks.acc,
      });
    }
  }

  return shuffle(qs);
}

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ── Storage ───────────────────────────────────────────────────────────
async function load() {
  try { const r=await window.storage.get('gq_v3'); return r?JSON.parse(r.value):{questions:{},sessions:[]}; }
  catch { return {questions:{},sessions:[]}; }
}
async function save(d) {
  try { await window.storage.set('gq_v3',JSON.stringify(d)); } catch(e){console.error(e);}
}

// ── Chromatic keyboard builder ────────────────────────────────────────
// Layout: two rows — natural notes on top, accidentals below
// Accidentals are offset to sit between their natural neighbors visually
// Natural: C  D  E  F  G  A  B    (indices 0,2,4,5,7,9,11)
// Acc:      C# D#   F# G# A#      (indices 1,3, ,6,8,10)
// Acc positions between naturals: C#=between C&D, D#=between D&E, gap at E-F, F#=between F&G, G#=between G&A, A#=between A&B

const NAT_BTNW = 58, NAT_GAP = 5;
const ACC_BTNW = 46, ACC_GAP = 5;

// Map: for each accidental (chromatic idx), which offset position in the natural row it sits after
// C(0)=pos0, D(2)=pos1, E(4)=pos2, F(5)=pos3, G(7)=pos4, A(9)=pos5, B(11)=pos6
// C#(1) sits between pos0 and pos1 → offset = pos0 right edge + gap/2
// D#(3) between pos1 and pos2
// F#(6) between pos3 and pos4
// G#(8) between pos4 and pos5
// A#(10) between pos5 and pos6

function buildKeyboard(keyRoot, isKeySig) {
  const rows = document.getElementById('chromRows');
  rows.innerHTML = '';

  // Natural row
  const natRow = document.createElement('div');
  natRow.className = 'chrom-natural';

  // Accidental row — we'll use a flex row with spacers
  const accRow = document.createElement('div');
  accRow.className = 'chrom-accidental';
  accRow.style.display = 'flex';
  accRow.style.gap = '0';
  accRow.style.alignItems = 'center';

  // Natural buttons
  NATURALS.forEach((ni, pos) => {
    const btn = makeNoteBtn(ni, 'natural', keyRoot, isKeySig);
    natRow.appendChild(btn);
  });

  // Accidental row layout:
  // Before C# : half a natural btn + half a gap  (= (NAT_BTNW/2 + NAT_GAP/2) - (ACC_BTNW/2))
  // C# D#  [wide gap at E-F]  F# G# A#
  // Spacer sizes computed so acc btn center aligns with the boundary between adjacent naturals.
  // Center of C# = C.center + (NAT_BTNW+NAT_GAP)/2
  // C.center = NAT_BTNW/2
  // So C# left edge = C.center + (NAT_BTNW+NAT_GAP)/2 - ACC_BTNW/2

  const unit = NAT_BTNW + NAT_GAP; // 63px
  // acc positions by index in ACCIDENTALS: [C#, D#, F#, G#, A#]
  // centers in natural row coordinate space:
  // C# center = 0.5*NAT_BTNW + unit        = 29 + 63 = 92  (1 full unit from C left edge + 0.5 btn)
  // Actually let's think of each natural as occupying a "slot" of width unit.
  // Natural slot n starts at n*unit.
  // C=slot0, D=slot1, E=slot2, F=slot3, G=slot4, A=slot5, B=slot6
  // C# center = slot0.right + NAT_GAP/2 = NAT_BTNW + NAT_GAP/2 = 58+2.5=60.5... 
  // Simpler: just use specific pixel offsets as left margins / spacers.
  // Each acc btn is ACC_BTNW wide. We need spacers between them.
  // Let's compute the left edge of each accidental:
  // left(C#) = NAT_BTNW - ACC_BTNW/2 + NAT_GAP/2 = 58-23+2.5 = 37.5
  // left(D#) = left(C#) + ACC_BTNW + spacer1
  //   where spacer1 = left(D#) - (left(C#)+ACC_BTNW)
  //   left(D#) = 2*unit - ACC_BTNW/2 - unit + ... let me just compute absolute positions.

  // Absolute left of each natural btn:
  // C:  0*(unit) = 0
  // D:  1*(unit) = 63
  // E:  2*(unit) = 126
  // F:  3*(unit) = 189
  // G:  4*(unit) = 252
  // A:  5*(unit) = 315
  // B:  6*(unit) = 378

  // Accidental center = average of its two neighbor natural centers:
  // C# center = (C_center + D_center)/2 = (29 + 92)/2 = 60.5 → left = 60.5 - 23 = 37.5
  // D# center = (D_center + E_center)/2 = (92+155)/2 = 123.5 → left = 100.5
  // F# center = (F_center + G_center)/2 = (218.5+281.5)/2 = 250 → left = 227
  // G# center = (G_center + A_center)/2 = (281.5+344.5)/2 = 313 → left = 290
  // A# center = (A_center + B_center)/2 = (344.5+407.5)/2 = 376 → left = 353

  // So spacers (left edges): 37.5, 100.5, [gap], 227, 290, 353
  // gaps between:
  // before C#: 37.5
  // C# to D#: 100.5 - (37.5+ACC_BTNW) = 100.5-83.5 = 17
  // D# to gap: big gap → skip to F#
  // gap size: 227 - (100.5+46) = 227-146.5 = 80.5
  // F# to G#: 290 - (227+46) = 17
  // G# to A#: 353 - (290+46) = 17

  const accLayout = [
    { ni: 1,  spacerBefore: 37.5 },   // C#
    { ni: 3,  spacerBefore: 17 },     // D#
    { ni: 6,  spacerBefore: 80.5 },   // F#  (big gap skips E-F boundary)
    { ni: 8,  spacerBefore: 17 },     // G#
    { ni: 10, spacerBefore: 17 },     // A#
  ];

  accLayout.forEach(({ ni, spacerBefore }) => {
    const sp = document.createElement('div');
    sp.style.width  = spacerBefore + 'px';
    sp.style.flexShrink = '0';
    accRow.appendChild(sp);
    const btn = makeNoteBtn(ni, 'accidental', keyRoot, isKeySig);
    btn.style.width  = ACC_BTNW + 'px';
    btn.style.height = '44px';
    accRow.appendChild(btn);
  });

  rows.appendChild(natRow);
  rows.appendChild(accRow);
}

function makeNoteBtn(ni, type, keyRoot, isKeySig) {
  const btn = document.createElement('button');
  btn.className = `note-btn ${type}`;
  btn.dataset.ni = ni;
  // Display name — for key sig use flat/sharp based on key
  btn.textContent = dn(NOTES[ni], keyRoot);
  btn.onclick = () => toggleNote(ni, btn);
  return btn;
}

// ── Session state ─────────────────────────────────────────────────────
let S = null;
const cats = new Set(['maj']);

function toggleCat(c) {
  if (cats.has(c) && cats.size===1) return;
  cats.has(c) ? cats.delete(c) : cats.add(c);
  document.getElementById('togMaj').className='tog-btn'+(cats.has('maj')?' on-maj':'');
  document.getElementById('togMin').className='tog-btn'+(cats.has('min')?' on-min':'');
  document.getElementById('togKey').className='tog-btn'+(cats.has('key')?' on-key':'');
}

function startSession() {
  const deck = buildDeck(cats);
  S = { deck, orig:deck, idx:0, got:0, miss:0, total:0, t0:Date.now(), missedQs:[], missedSet:new Set(), cats:new Set(cats), selected:new Set() };
  show('quiz');
  document.getElementById('btnEnd').style.display='';
  tick(); showQuestion();
}

function replaySession() {
  S.deck=shuffle(S.orig); S.idx=0; S.got=0; S.miss=0; S.total=0;
  S.t0=Date.now(); S.missedQs=[]; S.missedSet=new Set(); S.selected=new Set();
  show('quiz');
  document.getElementById('btnEnd').style.display='';
  tick(); showQuestion();
}

function goSetup() { S=null; show('setup'); document.getElementById('btnEnd').style.display='none'; }
function curQ()    { return S.deck[S.idx % S.deck.length]; }

function showQuestion() {
  const q = curQ();
  S.selected = new Set();

  document.getElementById('cardCat').textContent     = q.cat;
  document.getElementById('cardQ').textContent       = q.q;
  document.getElementById('cardInstruct').textContent = q.instruct;

  // Clear feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.innerHTML = '';

  // Build keyboard
  buildKeyboard(q.keyRoot, q.isKeySig);

  // For C major key sig (needed=0) enable check immediately
  document.getElementById('checkBtn').disabled = q.needed > 0;
  document.getElementById('nextBtn').style.display = 'none';
  updateSelCount();

  // Enable all note buttons
  document.querySelectorAll('.note-btn').forEach(b => { b.disabled = false; b.className = b.className.replace(/ selected| correct| wrong| reveal/g,'').trim(); });
}

function toggleNote(ni, btn) {
  if (btn.disabled) return;
  const q = curQ();

  if (S.selected.has(ni)) {
    S.selected.delete(ni);
    btn.classList.remove('selected');
  } else {
    S.selected.add(ni);
    btn.classList.add('selected');
  }

  // Enable check when enough notes selected (or for C major, always enabled)
  document.getElementById('checkBtn').disabled = (S.selected.size < q.needed) && q.needed > 0;
  updateSelCount();
}

function updateSelCount() {
  const q = curQ();
  const el = document.getElementById('selCount');
  if (q.needed === 0) { el.textContent = 'Select nothing (no accidentals)'; return; }
  el.textContent = `${S.selected.size} / ${q.needed} selected`;
}

function checkAnswer() {
  const q = curQ();

  // Compare selected set to answer set
  const correct = q.answer;
  const sel     = S.selected;

  // Got it = sets are equal
  const got = sel.size === correct.size && [...sel].every(n => correct.has(n));

  // Color the buttons
  document.querySelectorAll('.note-btn').forEach(btn => {
    btn.disabled = true;
    const ni = parseInt(btn.dataset.ni);
    if (correct.has(ni) && sel.has(ni))      btn.classList.add('correct');   // right, selected
    else if (sel.has(ni) && !correct.has(ni)) btn.classList.add('wrong');    // wrong selection
    else if (correct.has(ni) && !sel.has(ni)) btn.classList.add('reveal');   // missed — show answer
  });

  // Feedback banner
  const fb = document.getElementById('feedback');
  if (got) {
    fb.className = 'feedback show fb-correct';
    fb.innerHTML = `✓ Correct! <span class="fb-answer">${q.answerStr}</span>`;
  } else {
    fb.className = 'feedback show fb-wrong';
    fb.innerHTML = `✗ Not quite. <span class="fb-answer">Answer: ${q.answerStr}</span>`;
  }

  // Record
  S.total++; got ? S.got++ : S.miss++;
  if (!got && !S.missedSet.has(q.id)) { S.missedSet.add(q.id); S.missedQs.push(q); }
  tick();
  recordAnswer(q, got);

  // Show next button, hide check
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display  = '';
}

function nextQuestion() {
  S.idx++;
  if (S.idx >= S.deck.length) { S.deck=shuffle(S.orig); S.idx=0; }
  document.getElementById('checkBtn').style.display = '';
  showQuestion();
}

function tick() {
  const pct = Math.min(100,(S.total/S.deck.length)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('sGot').textContent  = `✓ ${S.got}`;
  document.getElementById('sMiss').textContent = `✗ ${S.miss}`;
  document.getElementById('sTot').textContent  = `${S.total} answered`;
}

async function recordAnswer(q, got) {
  const d = await load();
  if (!d.questions[q.id]) d.questions[q.id]={cat:q.cat,q:q.q,answer:q.answerStr,attempts:0,correct:0,lastSeen:0};
  const r=d.questions[q.id]; r.attempts++; if(got) r.correct++; r.lastSeen=Date.now();
  await save(d);
}

async function endSession() {
  if (!S) return;
  const dur=Math.round((Date.now()-S.t0)/1000);
  const acc=S.total>0?Math.round(S.got/S.total*100):0;
  const d=await load();
  d.sessions.unshift({date:Date.now(),total:S.total,got:S.got,miss:S.miss,acc,dur,cats:[...S.cats]});
  if(d.sessions.length>200) d.sessions=d.sessions.slice(0,200);
  await save(d);
  document.getElementById('btnEnd').style.display='none';
  buildSummary(acc,dur); show('summary');
}

function buildSummary(acc,dur) {
  const mins=Math.floor(dur/60),secs=dur%60;
  const c=acc>=80?'var(--green)':acc>=55?'var(--accent)':'var(--red)';
  document.getElementById('sumStats').innerHTML=`
    <div class="sum-stat"><div class="sum-val" style="color:${c}">${acc}%</div><div class="sum-lbl">Accuracy</div></div>
    <div class="sum-stat"><div class="sum-val">${S.total}</div><div class="sum-lbl">Answered</div></div>
    <div class="sum-stat"><div class="sum-val" style="color:var(--green)">${S.got}</div><div class="sum-lbl">Got It</div></div>
    <div class="sum-stat"><div class="sum-val" style="color:var(--red)">${S.miss}</div><div class="sum-lbl">Missed</div></div>
    <div class="sum-stat"><div class="sum-val" style="color:var(--text-dim)">${mins}:${String(secs).padStart(2,'0')}</div><div class="sum-lbl">Time</div></div>`;
  const mt=document.getElementById('missTitle'), ml=document.getElementById('missList');
  if (S.missedQs.length) {
    mt.textContent=`Missed this session (${S.missedQs.length}):`;
    ml.innerHTML=S.missedQs.map(q=>`<div class="miss-item">${q.q}<small>Answer: ${q.answerStr}</small></div>`).join('');
  } else {
    mt.textContent=''; ml.innerHTML=`<div style="color:var(--green);font-size:15px;letter-spacing:1px;">Perfect session — no misses! 🎸</div>`;
  }
}

// ── Analytics ─────────────────────────────────────────────────────────
let af='all';
async function openAnalytics() { document.getElementById('analyticsOverlay').classList.add('open'); await renderAnalytics(); }
function closeAnalytics() { document.getElementById('analyticsOverlay').classList.remove('open'); }
function setAF(f) { af=f; renderAnalytics(); }

async function renderAnalytics() {
  const d=await load(), body=document.getElementById('analyticsBody');
  const qArr=Object.values(d.questions);
  if (!qArr.length && !d.sessions.length) { body.innerHTML='<div class="no-data">Complete a session first.</div>'; return; }

  const totAtt=qArr.reduce((s,r)=>s+r.attempts,0);
  const totCor=qArr.reduce((s,r)=>s+r.correct,0);
  const oAcc=totAtt>0?Math.round(totCor/totAtt*100):0;
  const oCol=oAcc>=80?'var(--green)':oAcc>=55?'var(--accent)':'var(--red)';

  const fOpts=[{k:'all',l:'All'},{k:'MAJOR TRIADS',l:'Major Triads'},{k:'MINOR TRIADS',l:'Minor Triads'},{k:'KEY SIGNATURES',l:'Key Signatures'}];
  const fRow=fOpts.map(f=>`<button class="a-f-btn${af===f.k?' on':''}" onclick="setAF('${f.k}')">${f.l}</button>`).join('');

  let rows=af==='all'?qArr:qArr.filter(r=>r.cat===af);
  rows=[...rows].sort((a,b)=>{
    const aa=a.attempts?a.correct/a.attempts:0,ab=b.attempts?b.correct/b.attempts:0;
    return aa!==ab?aa-ab:b.attempts-a.attempts;
  });

  const trows=rows.map(r=>{
    const acc=r.attempts?Math.round(r.correct/r.attempts*100):null;
    const cls=acc===null?'':acc>=80?'acc-good':acc>=55?'acc-mid':'acc-bad';
    const bc=acc===null?'#383630':acc>=80?'var(--green)':acc>=55?'var(--accent)':'var(--red)';
    return `<tr>
      <td class="td-q">${r.q}</td>
      <td class="td-ans">${r.answer}</td>
      <td><span class="td-acc ${cls}">${acc!==null?acc+'%':'—'}</span><span class="bar-bg"><span class="bar-fill" style="width:${acc??0}%;background:${bc}"></span></span></td>
      <td style="color:var(--text-dim);font-size:12px;">${r.attempts}</td>
      <td style="color:var(--text-faint);font-size:11px;">${r.lastSeen?ago(r.lastSeen):'—'}</td>
    </tr>`;
  }).join('');

  const table=rows.length
    ?`<table class="a-table"><thead><tr><th>Question</th><th>Answer</th><th>Accuracy</th><th>Attempts</th><th>Last Seen</th></tr></thead><tbody>${trows}</tbody></table>`
    :'<div class="no-data">No data for this filter.</div>';

  const srows=d.sessions.slice(0,15).map(s=>{
    const c=s.acc>=80?'var(--green)':s.acc>=55?'var(--accent)':'var(--red)';
    const m=Math.floor(s.dur/60),sc=s.dur%60;
    const ct=(s.cats||[]).map(c=>c==='maj'?'Major':c==='min'?'Minor':'Key Sigs').join(', ');
    return `<div class="sess-row"><span class="sess-date">${fmt(s.date)}</span><span style="font-family:var(--mono-font);font-weight:700;color:${c}">${s.acc}%</span><span class="sess-detail">✓${s.got} ✗${s.miss} · ${s.total} answered · ${m}:${String(sc).padStart(2,'0')} · ${ct}</span></div>`;
  }).join('');

  body.innerHTML=`
    <div class="a-top">
      <div class="a-stat"><div class="a-stat-val" style="color:${oCol}">${oAcc}%</div><div class="a-stat-lbl">Overall Accuracy</div></div>
      <div class="a-stat"><div class="a-stat-val">${totAtt}</div><div class="a-stat-lbl">Total Attempts</div></div>
      <div class="a-stat"><div class="a-stat-val">${qArr.length}</div><div class="a-stat-lbl">Questions Seen</div></div>
      <div class="a-stat"><div class="a-stat-val" style="color:var(--text-dim)">${d.sessions.length}</div><div class="a-stat-lbl">Sessions</div></div>
    </div>
    <div class="a-sec">
      <div class="a-sec-hdr">QUESTION BREAKDOWN — hardest first</div>
      <div class="a-filter-row">${fRow}</div>
      ${table}
    </div>
    <div class="a-sec">
      <div class="a-sec-hdr">RECENT SESSIONS</div>
      <div style="display:flex;flex-direction:column;gap:5px;">${srows||'<div class="no-data">No sessions yet.</div>'}</div>
    </div>`;
}

function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function fmt(ts){return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});}
function show(s){
  document.getElementById('setupScreen').style.display  =s==='setup'  ?'':'none';
  document.getElementById('quizScreen').style.display   =s==='quiz'   ?'flex':'none';
  document.getElementById('summaryScreen').style.display=s==='summary'?'flex':'none';
}
</script>
</body>
</html>
